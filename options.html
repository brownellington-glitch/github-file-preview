<!DOCTYPE html>
<html>
<head>
  <title>GitHub PR File Preview - Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      padding: 24px;
      max-width: 500px;
      margin: 0 auto;
      color: #c9d1d9;
      background: #0d1117;
    }
    h1 {
      font-size: 18px;
      margin-bottom: 4px;
    }
    p.desc {
      color: #8b949e;
      font-size: 13px;
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #30363d;
      border-radius: 6px;
      background: #161b22;
      color: #c9d1d9;
      font-size: 14px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #58a6ff;
      box-shadow: 0 0 0 3px rgba(56,139,253,0.3);
    }
    .hint {
      color: #8b949e;
      font-size: 12px;
      margin-top: 6px;
    }
    .hint a {
      color: #58a6ff;
    }
    button {
      margin-top: 16px;
      padding: 8px 20px;
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover {
      background: #2ea043;
    }
    .status {
      margin-top: 12px;
      font-size: 13px;
      color: #3fb950;
      display: none;
    }
  </style>
</head>
<body>
  <h1>GitHub PR File Preview</h1>
  <p class="desc">Preview PDF, XLSX, and DOCX files directly in GitHub Pull Request pages.</p>

  <label for="token">GitHub Personal Access Token</label>
  <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />
  <div class="hint">
    Optional. Required only for <strong>private repositories</strong>.<br>
    For public repos, the extension works without a token.<br>
    <a href="https://github.com/settings/tokens/new?scopes=repo&description=GitHub+PR+File+Preview" target="_blank">Generate a token</a> with <code>repo</code> scope.
  </div>

  <button id="save">Save</button>
  <div class="status" id="status">Settings saved!</div>

  <script src="options.js"></script>
</body>
</html>
